name: Download with yt-dlp or wget & Save to Repo

on:
  push:
    branches:
      - "**"

jobs:
  download:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup yt-dlp
        uses: AnimMouse/setup-yt-dlp@v3
          
      - name: Setup wget
        run: |
          sudo apt-get update
          sudo apt-get install -y wget

      - name: Setup YouTube Cookies (only for yt-dlp)
        run: |
          mkdir -p ~/.cache/yt-dlp/youtube
          echo "${{ secrets.YOUTUBE_COOKIES }}" > ~/.cache/yt-dlp/youtube/cookies.txt
          echo "✅ Cookies installed ($(wc -l < ~/.cache/yt-dlp/youtube/cookies.txt) lines)"

      - name: Parse commit message and download
        run: |
          MSG=$(git log -1 --pretty=%B)
          echo "Commit message:"
          echo "$MSG"
          echo "----------------------------------------"

          # Extract URL from commit message - FIXED for quotes
          URL=$(echo "$MSG" | grep -oP 'https?://[^\s"\047<>]+' | head -n1 | sed 's/["\047]//g')
          
          if [ -z "$URL" ]; then
            echo "❌ No URL found in commit message"
            exit 1
          fi

          echo "📥 URL: $URL"

          # Determine download method based on tags in commit message
          if echo "$MSG" | grep -qi "\*\*video\*\*"; then
            echo "🎬 Detected **video** tag - Using yt-dlp"
            DOWNLOAD_METHOD="yt-dlp"
          elif echo "$MSG" | grep -qi "\*\*file\*\*"; then
            echo "📁 Detected **file** tag - Using wget"
            DOWNLOAD_METHOD="wget"
          else
            echo "⚠️ No specific tag found (**video** or **file**), defaulting to yt-dlp"
            DOWNLOAD_METHOD="yt-dlp"
          fi

          mkdir -p downloads

          if [ "$DOWNLOAD_METHOD" = "yt-dlp" ]; then
            # yt-dlp configuration
            QUALITY="best"
            PLAYLIST="--no-playlist"
            AUDIO_ONLY="false"
            SUBTITLES="false"
            SPONSORBLOCK="true"

            if echo "$MSG" | grep -qi "quality: *1080"; then QUALITY="1080"; fi
            if echo "$MSG" | grep -qi "quality: *720";  then QUALITY="720"; fi
            if echo "$MSG" | grep -qi "quality: *480";  then QUALITY="480"; fi

            if echo "$MSG" | grep -qi "playlist: *true";      then PLAYLIST="--yes-playlist"; fi
            if echo "$MSG" | grep -qi "audio-only: *true";    then AUDIO_ONLY="true"; fi
            if echo "$MSG" | grep -qi "subtitles: *true";     then SUBTITLES="true"; fi
            if echo "$MSG" | grep -qi "sponsorblock: *false"; then SPONSORBLOCK="false"; fi

            echo "⚙️ yt-dlp Options: Quality=$QUALITY | Playlist=${PLAYLIST/--no-playlist/Disabled} | Audio=$AUDIO_ONLY"

            YT_CMD="yt-dlp \
              --concurrent-fragments 8 \
              --retries 10 \
              --fragment-retries 10 \
              --cookies ~/.cache/yt-dlp/youtube/cookies.txt"

            if [ "$AUDIO_ONLY" = "true" ]; then
              YT_CMD="$YT_CMD -x --audio-format mp3 --audio-quality 0"
            else
              case $QUALITY in
                1080) YT_CMD="$YT_CMD -f 'bestvideo[height<=1080]+bestaudio/best[height<=1080]'" ;;
                720)  YT_CMD="$YT_CMD -f 'bestvideo[height<=720]+bestaudio/best[height<=720]'" ;;
                480)  YT_CMD="$YT_CMD -f 'bestvideo[height<=480]+bestaudio/best[height<=480]'" ;;
                *)    YT_CMD="$YT_CMD -f 'bestvideo+bestaudio/best'" ;;
              esac
              YT_CMD="$YT_CMD --merge-output-format mp4"
            fi

            if [ "$PLAYLIST" = "--yes-playlist" ]; then
              YT_CMD="$YT_CMD --yes-playlist"
            else
              YT_CMD="$YT_CMD --no-playlist"
            fi

            [ "$SUBTITLES" = "true" ] && YT_CMD="$YT_CMD --write-auto-sub --embed-subs"
            [ "$SPONSORBLOCK" = "true" ] && YT_CMD="$YT_CMD --sponsorblock-remove all"

            YT_CMD="$YT_CMD --embed-metadata --embed-thumbnail --embed-chapters --restrict-filenames"
            YT_CMD="$YT_CMD --output 'downloads/%(title)s [%(id)s].%(ext)s'"

            echo "🚀 Running yt-dlp..."
            eval "$YT_CMD \"$URL\""

          elif [ "$DOWNLOAD_METHOD" = "wget" ]; then
            # wget configuration
            TIMEOUT="60"
            USER_AGENT="Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36"
            
            if echo "$MSG" | grep -qi "timeout: *[0-9]\+"; then
              TIMEOUT=$(echo "$MSG" | grep -oP "timeout: *\K[0-9]+")
            fi
            
            # Extract filename from URL - FIXED
            FILENAME=$(basename "$URL" | sed 's/?.*//' | sed 's/["\047]//g')
            if [ -z "$FILENAME" ] || [ "$FILENAME" = "/" ]; then
              FILENAME="downloaded_file"
            fi
            
            # Clean filename
            FILENAME=$(echo "$FILENAME" | sed 's/[^a-zA-Z0-9._-]/_/g')
            
            echo "⚙️ wget Options: Timeout=${TIMEOUT}s"
            echo "📄 Output filename: $FILENAME"
            
            # Download with wget
            echo "🚀 Running wget..."
            wget \
              --timeout="$TIMEOUT" \
              --tries=3 \
              --retry-connrefused \
              --user-agent="$USER_AGENT" \
              --header="Accept: */*" \
              --header="Accept-Encoding: gzip, deflate, br" \
              --header="Connection: keep-alive" \
              --progress=bar:force \
              --show-progress \
              -O "downloads/$FILENAME" \
              "$URL"
            
            if [ $? -eq 0 ] && [ -f "downloads/$FILENAME" ]; then
              echo "✅ Download completed successfully"
            else
              echo "❌ Download failed"
              exit 1
            fi
          fi

          echo "✅ Download finished"

      - name: Split large files into 90MB chunks
        run: |
          echo "🔧 Processing downloaded files for splitting..."
          
          LIMIT=$((90 * 1024 * 1024))
          
          if [ ! -d "downloads" ] || [ -z "$(ls -A downloads)" ]; then
            echo "⚠️ No files found in downloads directory"
            exit 0
          fi
          
          for FILE in downloads/*; do
            [ -f "$FILE" ] || continue
          
            SIZE=$(stat -c%s "$FILE" 2>/dev/null || stat -f%z "$FILE" 2>/dev/null)
            BASENAME=$(basename "$FILE")
            NAME="${BASENAME%.*}"
          
            FOLDERNAME=$(echo "$NAME" \
              | tr '[:upper:]' '[:lower:]' \
              | sed 's/[^a-z0-9]/-/g' \
              | sed 's/-\+/-/g' \
              | sed 's/^-//;s/-$//')
          
            echo "📄 $BASENAME"
          
            if [ "$SIZE" -gt "$LIMIT" ]; then
              echo "✂️ Splitting large file → Folder: $FOLDERNAME"
              mkdir -p "downloads/$FOLDERNAME"
              mv "$FILE" "downloads/$FOLDERNAME/$BASENAME"
              cd "downloads/$FOLDERNAME" || exit 1
              zip -s 90m "${FOLDERNAME}.zip" "$BASENAME" -q
              rm -f "$BASENAME"
              cd ../..
              echo "✅ Multipart zip created"
            else
              echo "✅ File under 90MB → kept as single file"
            fi
          done
          
          echo "🎉 All files processed successfully"

      - name: Commit & Push
        run: |
          BRANCH="${GITHUB_REF_NAME}"
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add downloads/
          git commit -m "Add downloaded files from commit [skip ci]" || echo "Nothing to commit"
          git push origin HEAD:$BRANCH
